<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MusFy Updates</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050505;
        color: #f5f5f5;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 48px));
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 32px;
        background: linear-gradient(180deg, rgba(18, 18, 18, 0.96), rgba(8, 8, 8, 0.98));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0 0 10px;
        color: #b5b5b5;
        line-height: 1.6;
      }

      code {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05);
        color: #67e8f9;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MusFy Updates</h1>
      <p>Host estático do canal de atualização do MusFy.</p>
      <p>O desktop consulta automaticamente <code>/windows/latest.yml</code> para descobrir novas versões.</p>
      <p>Depois de sincronizar um release, publique esta pasta em um host estático compatível.</p>
    </main>
  </body>
</html>
